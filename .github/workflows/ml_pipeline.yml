name: Shareq ML Automation Pipeline

on:
  schedule:
    # Run data ingestion every day at 12:30 UTC (6:00 PM IST)
    - cron: '30 12 * * *'
  
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run Model Training (train_model.py)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We install PyTorch CPU version specifically for GitHub Actions to save time and space
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run Daily Data Ingestion
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          echo "Running ingest_metrics.py..."
          python ingest_metrics.py
          echo "Running ingest_sentiment.py..."
          python ingest_sentiment.py

      - name: Run Model Training (Weekly or Manual)
        # We only train if manually requested OR if it's Sunday (day 0)
        if: ${{ github.event.inputs.run_training == 'true' || github.event.schedule == '0 18 * * 0' }}
        run: |
          echo "Training PyTorch LSTM Model..."
          python train_model.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Auto-update ML pipeline data"
          branch: "ml-pipeline-update"
          delete-branch: true
          title: "🤖 Daily ML Pipeline Update"
          body: |
            This PR was automatically generated by the Shareq ML Automation Pipeline.
            
            It contains the latest scraped stock metrics, FinBERT sentiment scores, and the LSTM model checkpoint (`best_model.pth`).
            
            Please review and merge this PR to keep the main dashboard updated!
          labels: "automated pr, ml-data"
